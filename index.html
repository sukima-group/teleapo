/* ---------- ストレージ ---------- */
function ld(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}
function sv(k,v){
  try{localStorage.setItem(k,JSON.stringify(v));return true}
  catch(e){
    /* v17: QuotaExceededError 時に hist を自動削減して再試行 */
    if(e&&(e.name==="QuotaExceededError"||e.code===22||String(e).indexOf("quota")>=0)){
      console.warn("[sv] QuotaExceeded for "+k+" - attempting auto-prune");
      var pruned=false;
      /* 各ユーザーのhistを300件に削減 */
      for(var i=0;i<STAFF.length;i++){
        var hk="h-"+STAFF[i].id;
        var h=ld(hk);
        if(h&&h.length>300){
          try{localStorage.setItem(hk,JSON.stringify(h.slice(0,300)));pruned=true}catch(e2){}

      }
      /* DLQも50件に */
      var dlq=ld("sq_dlq");
      if(dlq&&dlq.length>20){try{localStorage.setItem("sq_dlq",JSON.stringify(dlq.slice(-20)))}catch(e3){}}
      if(pruned){
        try{localStorage.setItem(k,JSON.stringify(v));console.log("[sv] retry succeeded after prune");return true}
        catch(e4){}
      }
      /* それでも失敗 → ユーザーに通知 */

    }

    try{flash("⚠️ データ保存に失敗: "+k)}catch(ee){}
    return false;
  }
}
function pad(n){return n<10?"0"+n:""+n}

/* ---------- 電話番号 ---------- */
/* 表示用：日本式に整形 (03-1234-5678 / 080-1234-5678 / +81-3-1234-5678 等) */
function fmtPhone(s){
  if(!s)return"";
  var n=String(s).replace(/[^\d+]/g,"");
  if(!n)return String(s);
  if(n.startsWith("+81"))n="0"+n.slice(3);
  if(n.startsWith("0")){
    /* 携帯・IP電話 (090/080/070/050) → 0XX-XXXX-XXXX */
    if(n.length===11&&/^(090|080|070|050)/.test(n))return n.slice(0,3)+"-"+n.slice(3,7)+"-"+n.slice(7);
    /* 03/06 (東京・大阪) → 0X-XXXX-XXXX */
    if(n.length===10&&/^0[36]/.test(n))return n.slice(0,2)+"-"+n.slice(2,6)+"-"+n.slice(6);
    /* その他10桁固定 → 0XX-XXX-XXXX */
    if(n.length===10)return n.slice(0,3)+"-"+n.slice(3,6)+"-"+n.slice(6);
    /* 0120/0800 → 0XXX-XXX-XXX */
    if(n.length===10&&/^(0120|0800)/.test(n))return n.slice(0,4)+"-"+n.slice(4,7)+"-"+n.slice(7);
  }
  return n;
}

var SQ=ld("sq")||[];

var SQ_RETRIES=ld("sq_retries")||{};  /* v16: localStorage永続化 */

function gasPost(data){
  /* v16: idempotency keyを発行 (リトライ時の二重送信防止) */
  var item={_id:Date.now()+"_"+Math.random().toString(36).slice(2,8),clientReqId:Date.now()+"_"+Math.random().toString(36).slice(2,12),...data};
  SQ.push(item);
  sv("sq",SQ);

  updateBadge();
  return item._id;
}
function flushSQ(){
  if(SQ_SENDING||!navigator.onLine||!SQ.length||!GAS)return;
  SQ_SENDING=true;
  var item=SQ[0];
  var payload={};for(var k in item)if(k!=="_id")payload[k]=item[k];
  /* v16: AbortController で 30秒タイムアウト */
  var ctrl=("AbortController" in window)?new AbortController():null;
  var tmout=ctrl?setTimeout(function(){ctrl.abort()},30000):null;
  fetch(GAS,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(payload),
    redirect:"follow",
    keepalive:true,
    signal:ctrl?ctrl.signal:undefined
  })
  .then(function(res){
    if(tmout)clearTimeout(tmout);
    if(!res.ok){throw new Error("HTTP "+res.status)}
    return res.text();
  })
  .then(function(text){
    var ok=false,errMsg="",duplicate=false;
    if(text==="ok"||text==='"ok"')ok=true;
    else{
      try{var j=JSON.parse(text);
        if(j.status==="ok")ok=true;
        else if(j.status==="duplicate"){ok=true;duplicate=true}  /* v16: idempotency */
        else errMsg=j.message||text;
      }catch(e){
        if(text.indexOf("error")>=0)errMsg=text;
        else ok=true;  /* 不明だが2xxなので成功扱い */
      }
    }
    if(ok){
      SQ.shift();sv("sq",SQ);
      delete SQ_RETRIES[item._id];saveRetries();
      SQ_SENDING=false;updateBadge();
      if(duplicate)console.log("[SQ] duplicate detected, treated as success (idempotent)");
      if(SQ.length)setTimeout(flushSQ,300);
    }else{
      handleSQFailure(item,errMsg||"unknown GAS error");
    }
  })
  .catch(function(err){
    if(tmout)clearTimeout(tmout);
    handleSQFailure(item,String(err));
  });
}
function handleSQFailure(item,reason){
  SQ_RETRIES[item._id]=(SQ_RETRIES[item._id]||0)+1;
  var n=SQ_RETRIES[item._id];
  saveRetries();  /* v16: 永続化 */
  console.warn("[SQ] retry #"+n+" for "+item.type+": "+reason);
  if(n>=5){
    var dlq=ld("sq_dlq")||[];
    dlq.push({...item,_failedAt:Date.now(),_reason:reason,_retries:n});
    if(dlq.length>50)dlq=dlq.slice(-50);
    sv("sq_dlq",dlq);
    SQ.shift();sv("sq",SQ);
    delete SQ_RETRIES[item._id];saveRetries();
    flash("⚠️ 送信失敗 ("+item.type+") - DLQに保存");
    /* v16: 重要なtype なら大きく警告 */
    if(item.type==="daily_report"||item.type==="appointment"){

    }
  }

  var delay=Math.min(60000,Math.pow(2,n)*1000);
  setTimeout(flushSQ,delay);
}

/* ---------- v20: 確実な送信 (キュー経由ではなく直接送信) ---------- */
/* 重要な操作 (リストアップロード等) はこちらを使う */
/* 戻り値: Promise → resolve(response data) / reject(error) */
function directGasPost(payload,timeoutMs){
  if(!GAS)return Promise.reject(new Error("GAS URL未設定"));
  if(!navigator.onLine)return Promise.reject(new Error("オフライン"));
  var ctrl=("AbortController" in window)?new AbortController():null;
  var to=ctrl?setTimeout(function(){ctrl.abort()},timeoutMs||60000):null;
  /* clientReqId 付与 (idempotency) */
  if(!payload.clientReqId)payload.clientReqId=Date.now()+"_"+Math.random().toString(36).slice(2,12);
  return fetch(GAS,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify(payload),
    redirect:"follow",
    signal:ctrl?ctrl.signal:undefined
    /* keepalive はナシ (大きいpayloadでは制限あり) */
  })
  .then(function(r){
    if(to)clearTimeout(to);
    if(!r.ok)throw new Error("HTTP "+r.status+" "+r.statusText);
    return r.text();
  })
  .then(function(t){
    var d;
    try{d=JSON.parse(t)}catch(e){throw new Error("Invalid JSON response: "+t.slice(0,200))}
    if(d.status==="ok"||d.status==="duplicate")return d;
    throw new Error(d.message||t);
  })
  .catch(function(err){
    if(to)clearTimeout(to);
    throw err;
  });
}

/* v20: チャンク分割アップロード - 200件ずつ送信 */
function uploadListInChunks(pin,rows,onProgress){
  var CHUNK_SIZE=200;
  var total=rows.length;
  var chunks=[];
  for(var i=0;i<total;i+=CHUNK_SIZE){
    chunks.push(rows.slice(i,i+CHUNK_SIZE));
  }
  if(chunks.length===0)chunks.push([]);  /* 空でも1回送信 */
  var sessionId=Date.now()+"_"+Math.random().toString(36).slice(2,8);
  var idx=0;
  function next(){
    if(idx>=chunks.length){
      return Promise.resolve({status:"ok",total:total,chunks:chunks.length});
    }
    var chunk=chunks[idx];
    var isFirst=idx===0;
    var isLast=idx===chunks.length-1;
    if(onProgress)onProgress(idx+1,chunks.length);
    return directGasPost({
      type:"upload_list_chunk",
      pin:pin,
      sessionId:sessionId,
      chunkIndex:idx,
      totalChunks:chunks.length,
      isFirst:isFirst,
      isLast:isLast,
      rows:chunk
    },90000)
    .then(function(){idx++;return next()});
  }
  return next();
}

function loadFromGAS(staff,cb){
  if(!GAS||!navigator.onLine){if(cb)cb(false,"オフライン");return}
  flash("🔄 サーバーからデータ同期中...");
  /* AbortController で 30秒タイムアウト */
  var ctrl=("AbortController" in window)?new AbortController():null;
  var tmout=ctrl?setTimeout(function(){ctrl.abort()},30000):null;
  fetch(GAS,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({type:"fetch_state",pin:staff.pin}),
    redirect:"follow",
    signal:ctrl?ctrl.signal:undefined
  })
  .then(function(r){if(tmout)clearTimeout(tmout);if(!r.ok)throw new Error("HTTP "+r.status);return r.text()})
  .then(function(t){
    var d;
    try{d=JSON.parse(t)}catch(e){throw new Error("Invalid JSON: "+t.slice(0,100))}
    if(d.status!=="ok")throw new Error(d.message||"GAS error");
    
    /* 1. 架電リスト (v22: サーバーが正 - 空ならローカルもクリア) */
    /* 重要: 管理者がリストを削除した場合、GASは空になる。 */
    /*       その時はローカルも空にしないと、古いリストが残ってしまう。 */
    if(d.list!==undefined){
      if(d.list.length>0){
        rows=d.list;
        cm={co:0,ph:1,pe:2,ad:3};
        sv("l-"+staff.id,rows);sv("c-"+staff.id,cm);
        ci=0;skipped={};sv("sk-"+staff.id,{});
      }else{
        /* GAS側が空 = 管理者がまだ未設定または削除した状態 */
        /* ローカルもクリアして同期 */
        rows=[];
        cm=null;
        ci=0;skipped={};
        sv("l-"+staff.id,[]);
        sv("c-"+staff.id,null);
        sv("sk-"+staff.id,{});
      }
    }
    
    /* 2. 出退勤 (att) - GAS上のデータをマージ (新しい方を優先) */
    if(d.att){
      var localAtt=ld("at-"+staff.id)||{};
      /* GASにあるがlocalにない、または日付がGASの方が新しい場合は上書き */
      for(var dk in d.att){
        var srvA=d.att[dk],locA=localAtt[dk]||{};
        /* マージ: 各フィールドGASに値があればそれを採用、なければlocal保持 */
        localAtt[dk]={
          ci:srvA.ci||locA.ci||"",
          co:srvA.co||locA.co||"",
          bs:srvA.bs||locA.bs||"",
          be:srvA.be||locA.be||""
        };
      }
      att=localAtt;
      sv("at-"+staff.id,att);
    }
    
    /* 3. 架電履歴 (hist) - GAS上の最近1000件を採用 (localは破棄しない、IDで重複排除) */
    if(d.hist&&d.hist.length>0){
      var localHist=ld("h-"+staff.id)||[];
      var seenKeys={};
      var merged=[];
      /* GASのデータを先に追加 (同一の日付+時刻+電話番号で重複判定) */
      d.hist.forEach(function(h){
        h.u=staff.id;
        if(!h.id)h.id=Date.now()+Math.random();
        var key=(h.d||"")+"|"+(h.tm||"")+"|"+(h.ph||"")+"|"+(h.r||"");
        if(!seenKeys[key]){seenKeys[key]=true;merged.push(h)}
      });
      /* localのみのデータがあれば追加 (同期されていない最新の操作) */
      localHist.forEach(function(h){
        var key=(h.d||"")+"|"+(h.tm||"")+"|"+(h.ph||"")+"|"+(h.r||"");
        if(!seenKeys[key]){seenKeys[key]=true;merged.push(h)}
      });
      /* 日付・時刻でソート (新しい順) */
      merged.sort(function(a,b){
        var ad=(a.d||"")+"_"+(a.tm||""),bd=(b.d||"")+"_"+(b.tm||"");
        return bd.localeCompare(ad);
      });
      hist=merged.slice(0,1000);
      sv("h-"+staff.id,hist);
    }
    
    /* 4. アポ (appos) */
    if(d.appos&&d.appos.length>0){
      appos=d.appos;
      sv("a-"+staff.id,appos);
    }
    
    /* 5. 再架電 (cb) */
    if(d.cb&&d.cb.length>0){
      var localCb=ld("cb-"+staff.id)||[];
      /* 会社名+電話番号で重複排除 (シンプル) */
      var seen={};
      var mergedCb=[];
      d.cb.forEach(function(c){
        if(!c.id)c.id=Date.now()+Math.random();
        var k=(c.co||"")+"|"+(c.ph||"")+"|"+(c.schedule||"");
        if(!seen[k]){seen[k]=true;mergedCb.push(c)}
      });
      localCb.forEach(function(c){
        var k=(c.co||"")+"|"+(c.ph||"")+"|"+(c.at||c.schedule||"");
        if(!seen[k]){seen[k]=true;mergedCb.push(c)}
      });
      cbs=mergedCb;
      sv("cb-"+staff.id,cbs);
    }
    
    if(cb)cb(true,{
      list:(d.list||[]).length,
      hist:(d.hist||[]).length,
      appos:(d.appos||[]).length,
      cb:(d.cb||[]).length,
      attDays:Object.keys(d.att||{}).length
    });
  })
  .catch(function(err){
    if(tmout)clearTimeout(tmout);
    console.warn("[loadFromGAS] failed:",err.message);
    if(cb)cb(false,String(err.message||err));
  });
}

/* コールバック確定 */
function confirmCB(preset){
  var d=new Date();
  if(preset.mode==="add"){d=new Date(Date.now()+preset.min*60000)}
  else if(preset.mode==="tomorrow"){d=new Date();d.setDate(d.getDate()+1);d.setHours(preset.h,preset.m,0,0)}
  else if(preset.mode==="plus"){d=new Date();d.setDate(d.getDate()+preset.d);d.setHours(preset.h,preset.m,0,0)}
  else if(preset.mode==="custom"){
    if(!cbCustomDt){flash("⚠️ 日時を入力");return}
    d=new Date(cbCustomDt);if(isNaN(d.getTime())){flash("⚠️ 不正な日時");return}
  }
  var cur=rows[ci]||null;
  var entry={id:Date.now(),at:d.toISOString(),
    co:cur?gf(cur,"co"):"",pe:cur?gf(cur,"pe"):"",ph:cur?gf(cur,"ph"):"",
    memo:cbMemo,createdAt:new Date().toISOString(),done:false,rowIdx:ci};
  cbs.unshift(entry);sv("cb-"+U.id,cbs);
  gasPost({type:"callback",name:U.nm,pin:U.pin,sheet:U.sh,scheduledAt:dtJP(d),company:entry.co,person:entry.pe,phone:entry.ph,memo:entry.memo});

  selRes="cb";saveCall();
}

/* ---------- 勤怠 ---------- */
function punch(type){
  if(type==="co"){
    /* 退勤前に本日の集計プレビュー */
    var prev=summarizeDaily();
    /* v17: 出勤からそれなりに時間経過しているのにhistが空 → データ消失の可能性を警告 */
    var ciTime=att[td()]&&att[td()].ci;
    var hoursWorked=0;
    if(ciTime){
      var nowMin=new Date().getHours()*60+new Date().getMinutes();
      var p=ciTime.split(":");var ciMin=(parseInt(p[0])||0)*60+(parseInt(p[1])||0);
      hoursWorked=Math.max(0,(nowMin-ciMin)/60);
    }
    var warnPrefix="";
    if(hoursWorked>=2&&prev.totalCalls===0){
      warnPrefix="⚠️ "+hoursWorked.toFixed(1)+"時間勤務中ですが架電履歴が0件です。\nデータが消失している可能性があります。\n本当に退勤しますか？\n\n";
    }
    /* v19: ボトルネック分析を含める */
    var btlPrefix="";
    if(prev.totalCalls>0){
      btlPrefix+="\n\n📈 ボトルネック分析:\n";
      if(prev.bousouMaxCount>0){
        var sNum=prev.bousouMax.replace("s","");
        btlPrefix+="・暴走最多: ステップ"+sNum+" ("+prev.bousouMaxCount+"件)\n";
      }
      if(prev.endStepMaxCount>0){
        var eNum=prev.endStepMax.replace("S","");
        btlPrefix+="・終話最多: ステップ"+eNum+" ("+prev.endStepMaxCount+"件)\n";
      }
      if(prev.outTexts.length>0){
        btlPrefix+="・切り返しできなかったアウト: "+prev.outTexts.length+"件";
      }
    }
    var msg=warnPrefix+"本日の業務終了として記録します。\n管理者へ自動通知されます。\n\n📊 本日の集計プレビュー\n発信: "+autoCallCount+"件 / 架電結果: "+prev.totalCalls+"件 / アポ: "+prev.totalApos+"件 / 通話時間: "+fmtSec(prev.totalSec)+btlPrefix;
    showConfirm={title:"退勤しますか？",msg:msg,onYes:function(){doPunch("co")},onNo:function(){showConfirm=null;render()}};
    render();return;
  }
  doPunch(type);
}

/* v14: 本日の集計サマリー (退勤レポート用) */
function summarizeDaily(){
  var calls=tdc();
  var totalSec=0;calls.forEach(function(c){totalSec+=durSec(c.dur||"")});
  var totalApos=calls.filter(function(c){return c.r==="appo"}).length;
  var byResult={appo:0,cb:0,absent:0,refused:0,wrong:0,other:0};
  calls.forEach(function(c){if(byResult.hasOwnProperty(c.r))byResult[c.r]++});
  /* v19: ボトルネック分析 */
  var bousouCount={s1:0,s3:0,s4:0,s5:0};
  var endStepCount={S1:0,S2:0,S3:0,S4:0,S5:0};
  var outTexts=[];
  calls.forEach(function(c){
    /* 暴走 - bsArr (新形式) または bs 文字列 (旧形式) */
    if(c.bsArr&&c.bsArr.length){
      c.bsArr.forEach(function(id){if(bousouCount.hasOwnProperty(id))bousouCount[id]++});
    }else if(c.bs&&c.bs!=="なし"){
      /* "ステップ1,ステップ3" → s1, s3 */
      String(c.bs).split(",").forEach(function(part){
        var m=part.match(/ステップ(\d)/);
        if(m){var key="s"+m[1];if(bousouCount.hasOwnProperty(key))bousouCount[key]++}
      });
    }
    /* 終話ステップ */
    if(c.endStep&&endStepCount.hasOwnProperty(c.endStep))endStepCount[c.endStep]++;
    /* アウト */
    if(c.out&&String(c.out).trim())outTexts.push({
      d:c.d,tm:c.tm,co:c.co||"",text:String(c.out).trim()
    });
  });
  /* 最多ステップ算出 */
  var bousouMax="",bousouMaxCount=0;
  for(var k in bousouCount){if(bousouCount[k]>bousouMaxCount){bousouMaxCount=bousouCount[k];bousouMax=k}}
  var endStepMax="",endStepMaxCount=0;
  for(var k in endStepCount){if(endStepCount[k]>endStepMaxCount){endStepMaxCount=endStepCount[k];endStepMax=k}}
  return{
    totalCalls:calls.length,totalApos:totalApos,totalSec:totalSec,byResult:byResult,
    bousouCount:bousouCount,bousouMax:bousouMax,bousouMaxCount:bousouMaxCount,
    endStepCount:endStepCount,endStepMax:endStepMax,endStepMaxCount:endStepMaxCount,
    outTexts:outTexts
  };
}

/* テキストを2次元配列にパース */
function parseTextRows(text){
  text=text.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  var lines=text.split("\n").filter(function(l){return l.trim()});
  if(!lines.length)return[];
  var sep="\t";if(lines[0].indexOf("\t")<0)sep=lines[0].indexOf(",")>=0?",":"SP";
  function sp(l){
    if(sep==="\t")return l.split("\t").map(function(c){return String(c||"").trim()});
    if(sep===","){var r=[],cur="",q=false;for(var i=0;i<l.length;i++){var ch=l[i];if(ch==='"')q=!q;else if(ch===","&&!q){r.push(cur.trim());cur=""}else cur+=ch}r.push(cur.trim());return r}
    return l.split(/\s{2,}/).map(function(c){return String(c||"").trim()})
  }
  return lines.map(sp);
}

  if(all[0].some(function(c){return/^\d{2,4}[\-\d\(\)\s]{4,}/.test(c)}))isH=false;

      newCm.co>=0?(r[newCm.co]||""):"",

/* Excel/CSVファイル取込 (v12) */
function handleExcelFile(file){
  if(!file)return;
  var name=(file.name||"").toLowerCase();
  if(!/\.(xlsx|xls|csv|tsv|txt)$/.test(name)){
    impErr="対応形式: .xlsx / .xls / .csv / .tsv / .txt";render();return
  }
  flash("📂 "+file.name+" 読込中...");
  loadXLSX(function(ok,reason){
    if(!ok){
      impErr="⚠️ Excelライブラリ読込失敗"+(reason?"("+reason+")":"")+"。コピペは引き続き使えます。";
      render();return
    }
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var data=new Uint8Array(e.target.result);
        var wb=XLSX.read(data,{type:"array",cellDates:false,cellNF:false,cellText:true});
        var sheetName=wb.SheetNames[0];
        if(!sheetName){impErr="シートが見つかりません";render();return}
        var sheet=wb.Sheets[sheetName];
        var arr=XLSX.utils.sheet_to_json(sheet,{header:1,defval:"",raw:false,blankrows:false});
        if(!arr.length){impErr="シート「"+sheetName+"」にデータがありません";render();return}
        processImportRows(arr);
      }catch(err){impErr="ファイル解析エラー: "+err.message;render()}
    };
    reader.onerror=function(){impErr="ファイル読込失敗";render()};
    reader.readAsArrayBuffer(file);
  });
}

/* ===========================================================
   集計 (v11)
   =========================================================== */
function durSec(s){if(!s)return 0;var p=String(s).split(":");if(p.length!==2)return 0;return(parseInt(p[0])||0)*60+(parseInt(p[1])||0)}
function fmtSec(s){if(!s)return"0秒";var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;if(h>0)return h+"時間"+pad(m)+"分";if(m>0)return m+"分"+pad(ss)+"秒";return ss+"秒"}
function statsFor(period){
  var now=new Date(),from;
  if(period==="today"){from=new Date(now.getFullYear(),now.getMonth(),now.getDate())}
  else if(period==="week"){var dow=now.getDay()||7;from=new Date(now.getFullYear(),now.getMonth(),now.getDate()-(dow-1))}
  else if(period==="month"){from=new Date(now.getFullYear(),now.getMonth(),1)}
  else{from=new Date(2000,0,1)}
  var calls=hist.filter(function(c){if(!c.d)return false;var d=new Date(c.d+"T00:00:00");return d>=from});
  var totalSec=0;calls.forEach(function(c){totalSec+=durSec(c.dur)});
  var apos=calls.filter(function(c){return c.r==="appo"}).length;
  return{count:calls.length,totalSec:totalSec,apo:apos,rate:calls.length?Math.round(apos*1000/calls.length)/10:0,avgSec:calls.length?Math.round(totalSec/calls.length):0}
}
function statsByDay(days){
  var r=[];for(var i=days-1;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    var k=d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
    var calls=hist.filter(function(c){return c.d===k});
    var sec=0;calls.forEach(function(c){sec+=durSec(c.dur)});
    r.push({date:k,label:(d.getMonth()+1)+"/"+d.getDate(),count:calls.length,sec:sec,apo:calls.filter(function(c){return c.r==="appo"}).length})
  }return r
}

/* 時間別集計 (v12: 9〜17時の各バケット) */
function statsByHour(dateKey){
  var calls=hist.filter(function(c){return c.d===dateKey&&c.tm});
  var bucket={};for(var h=9;h<=17;h++)bucket[h]={count:0,sec:0,apo:0};
  calls.forEach(function(c){
    var hr=parseInt(String(c.tm).slice(0,2));
    if(isNaN(hr))return;
    if(hr<9)hr=9;if(hr>17)hr=17;
    bucket[hr].count++;
    bucket[hr].sec+=durSec(c.dur);
    if(c.r==="appo")bucket[hr].apo++;
  });
  var result=[];for(var h=9;h<=17;h++)result.push({hour:h,label:h+"時",count:bucket[h].count,sec:bucket[h].sec,apo:bucket[h].apo});
  return result;
}

/* ===========================================================

function csvEscape(v){
  v=String(v==null?"":v);
  if(v.indexOf(",")>=0||v.indexOf('"')>=0||v.indexOf("\n")>=0)return'"'+v.replace(/"/g,'""')+'"';
  return v;
}
function csvDownload(filename,headers,rows){
  /* BOM付きUTF-8 (Excel で文字化けしない) */
  var bom="\uFEFF";
  var lines=[headers.map(csvEscape).join(",")];
  rows.forEach(function(r){lines.push(r.map(csvEscape).join(","))});
  var blob=new Blob([bom+lines.join("\n")],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download=filename;document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url)},100);
  flash("📥 ダウンロード: "+filename);vib(40);
}

function storageStats(){

  try{

      var k=localStorage.key(i);
      var v=localStorage.getItem(k)||"";
      var size=k.length+v.length;
      total+=size;
      details.push({key:k,size:size});
    }
  }catch(e){return null}
  details.sort(function(a,b){return b.size-a.size});
  return{totalBytes:total,details:details.slice(0,10)};
}

}

function applyShiftTemplate(template){
  if(!U||U==="admin")return;
  var p=shiftMonth.split("-"),year=+p[0],month=+p[1];
  var lastDay=new Date(year,month,0).getDate();
  var changed=0;
  for(var d=1;d<=lastDay;d++){
    var key=year+"-"+pad(month)+"-"+pad(d);
    var dow=new Date(year,month-1,d).getDay();
    var isWeekend=(dow===0||dow===6);
    if(template==="weekday_full"){
      if(!isWeekend){shiftDays[key]={start:"09:30",end:"18:00"};changed++}
      else{shiftDays[key]="off";changed++}
    }else if(template==="all_full"){
      shiftDays[key]={start:"09:30",end:"18:00"};changed++;
    }else if(template==="weekday_morning"){
      if(!isWeekend){shiftDays[key]={start:"09:30",end:"12:30"};changed++}
      else{shiftDays[key]="off";changed++}
    }else if(template==="weekday_afternoon"){
      if(!isWeekend){shiftDays[key]={start:"13:00",end:"18:00"};changed++}
      else{shiftDays[key]="off";changed++}
    }else if(template==="clear"){
      delete shiftDays[key];changed++;
    }
  }
  sv("sft-"+U.id+"-"+shiftMonth,shiftDays);
  vib([40,30,40]);flash("📋 一括設定: "+changed+"日 更新");render();
}

var sdSel=function(){
  syncShiftDay();
  /* 終了 ≤ 開始 になった場合は終了を自動で +30分先に補正 */
  var sm=parseInt(showShiftDay.start.slice(0,2))*60+parseInt(showShiftDay.start.slice(3,5));
  var em=parseInt(showShiftDay.end.slice(0,2))*60+parseInt(showShiftDay.end.slice(3,5));
  if(em<=sm){
    var ix=TIME_SLOTS.indexOf(showShiftDay.start);
    if(ix>=0&&ix+1<TIME_SLOTS.length)showShiftDay.end=TIME_SLOTS[ix+1];
  }
